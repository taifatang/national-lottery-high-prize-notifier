name: Run Notifier

on:
  schedule:
    - cron: '0 17 * * 1-4'
  workflow_dispatch:
    inputs:
      test:
        description: 'Test — use console notifier only, skip day check'
        type: boolean
        default: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Run notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py ${{ github.event.inputs.test == 'true' && '--test' || '' }}
